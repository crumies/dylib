name: Build DunenBLELogger dylib

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git "$HOME/theos"
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Build dylib
        run: |
          make clean
          make

      - name: Collect dylib
        run: |
          mkdir -p output
          find . -name "DunenBLELogger.dylib" -print -exec cp {} output/ \;
          ls -la output

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DunenBLELogger-dylib
          path: output/DunenBLELogger.dylib
